name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Harness verification (deterministic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Harden trusted Node distribution permissions
        shell: bash
        run: |
          set -euo pipefail
          node_executable="$(node -p 'process.execPath')"
          node_root="$(dirname "$(dirname "$node_executable")")"
          sudo find "$node_root" -xdev \( -type f -o -type d \) -perm /022 -exec chmod go-w {} +
          if sudo find "$node_root" -xdev \( -type f -o -type d \) -perm /022 -print -quit | grep -q .; then
            echo "trusted Node distribution remains group- or world-writable" >&2
            exit 1
          fi

      - name: Prepare guarded cgroup-v2 delegation
        shell: bash
        run: |
          set -euo pipefail
          user="opencode-quality"
          root="/sys/fs/cgroup/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          home="/home/$user"
          sudo useradd --create-home --home-dir "$home" --shell /usr/sbin/nologin "$user"
          workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
          while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
            sudo setfacl -m "u:$user:--x" "$workspace_parent"
            workspace_parent="$(dirname "$workspace_parent")"
          done
          sudo chown -R "$user:$user" "$GITHUB_WORKSPACE"
          sudo mkdir "$root"
          sudo chown -R "$user:$user" "$root"
          sudo -u "$user" test -w "$root/cgroup.procs"
          sudo -u "$user" test -w "$root/cgroup.threads"
          sudo -u "$user" test -w "$root/cgroup.subtree_control"
          if sudo -u "$user" test -w "$(dirname "$root")/cgroup.procs"; then
            echo "guard cgroup is writable by the workload principal" >&2
            exit 1
          fi
          uid="$(id -u "$user")"
          helper="/usr/local/libexec/opencode-cgroup-attach-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          helper_source="$(cd "$RUNNER_TEMP" && pwd -P)/opencode-cgroup-attach-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          npm run build:linux-cgroup-attach -- \
            --out "$helper_source" \
            --uid "$uid" \
            --control "$root/opencode-quality-workload/cgroup.procs"
          sudo install -d -o root -g root -m 0755 /usr/local/libexec
          sudo install -o root -g root -m 0555 "$helper_source" "$helper"
          rm -f "$helper_source"
          sudoers="/etc/sudoers.d/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          printf '%s ALL=(root) NOPASSWD: %s *\n' "$user" "$helper" | sudo tee "$sudoers" > /dev/null
          sudo chmod 0440 "$sudoers"
          sudo visudo -cf "$sudoers"
          if sudo -u "$user" sudo -n -- /usr/bin/tee "$(dirname "$root")/cgroup.procs" < /dev/null > /dev/null 2>&1; then
            echo "attach helper can write the guard cgroup" >&2
            exit 1
          fi
          echo "OPENCODE_QUALITY_RUN_USER=$user" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_RUN_HOME=$home" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ROOT=$root" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_MODE=sudo-helper-v2" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_HELPER=$helper" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_SUDOERS=$sudoers" >> "$GITHUB_ENV"

      - name: Run deterministic verifier
        shell: bash
        run: |
          set -euo pipefail
          out="$GITHUB_WORKSPACE/.oc_harness/milestone-2/deterministic.json"
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /usr/bin/env \
            HOME="$OPENCODE_QUALITY_RUN_HOME" \
            PATH="$PATH" \
            CI=true \
            GITHUB_ACTIONS=true \
            GITHUB_SHA="$GITHUB_SHA" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            GITHUB_JOB="$GITHUB_JOB" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_BASE_SHA="${GITHUB_BASE_SHA:-}" \
            GITHUB_EVENT_BEFORE="${GITHUB_EVENT_BEFORE:-}" \
            OPENCODE_QUALITY_CGROUP_ROOT="$OPENCODE_QUALITY_CGROUP_ROOT" \
            OPENCODE_QUALITY_CGROUP_ATTACH_MODE="$OPENCODE_QUALITY_CGROUP_ATTACH_MODE" \
            OPENCODE_QUALITY_CGROUP_ATTACH_HELPER="$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" \
            OPENCODE_MILESTONE_RECEIPTS_OUT="$out" \
            npm run verify
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

      - name: Upload deterministic receipt bundle
        if: always()
        shell: bash
        run: |
          if [[ -d "$GITHUB_WORKSPACE/.oc_harness" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/.oc_harness"
          fi

      - name: Publish deterministic receipt bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-deterministic
          path: .oc_harness/milestone-2/deterministic.json
          if-no-files-found: error

      - name: Remove guarded cgroup-v2 delegation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
          cleanup_status=0
          if [[ -n "${OPENCODE_QUALITY_RUN_USER:-}" ]]; then
            workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
            while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
              sudo setfacl -x "u:$OPENCODE_QUALITY_RUN_USER" "$workspace_parent" || cleanup_status=$?
              workspace_parent="$(dirname "$workspace_parent")"
            done
          fi
          if [[ -n "${OPENCODE_QUALITY_CGROUP_ROOT:-}" && -d "$OPENCODE_QUALITY_CGROUP_ROOT" ]]; then
            sudo rmdir "$OPENCODE_QUALITY_CGROUP_ROOT" || cleanup_status=$?
          fi
          if [[ -n "${OPENCODE_QUALITY_SUDOERS:-}" && -f "$OPENCODE_QUALITY_SUDOERS" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_SUDOERS"
          fi
          if [[ -n "${OPENCODE_QUALITY_CGROUP_ATTACH_HELPER:-}" && -f "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER"
          fi
          exit "$cleanup_status"

  linux-containment:
    name: Linux cgroup-v2 operational evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Harden trusted Node distribution permissions
        shell: bash
        run: |
          set -euo pipefail
          node_executable="$(node -p 'process.execPath')"
          node_root="$(dirname "$(dirname "$node_executable")")"
          sudo find "$node_root" -xdev \( -type f -o -type d \) -perm /022 -exec chmod go-w {} +
          if sudo find "$node_root" -xdev \( -type f -o -type d \) -perm /022 -print -quit | grep -q .; then
            echo "trusted Node distribution remains group- or world-writable" >&2
            exit 1
          fi

      - name: Prepare guarded cgroup-v2 delegation
        shell: bash
        run: |
          set -euo pipefail
          user="opencode-quality"
          root="/sys/fs/cgroup/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          home="/home/$user"
          sudo useradd --create-home --home-dir "$home" --shell /usr/sbin/nologin "$user"
          workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
          while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
            sudo setfacl -m "u:$user:--x" "$workspace_parent"
            workspace_parent="$(dirname "$workspace_parent")"
          done
          sudo chown -R "$user:$user" "$GITHUB_WORKSPACE"
          sudo mkdir "$root"
          sudo chown -R "$user:$user" "$root"
          sudo -u "$user" test -w "$root/cgroup.procs"
          sudo -u "$user" test -w "$root/cgroup.threads"
          sudo -u "$user" test -w "$root/cgroup.subtree_control"
          if sudo -u "$user" test -w "$(dirname "$root")/cgroup.procs"; then
            echo "guard cgroup is writable by the workload principal" >&2
            exit 1
          fi
          uid="$(id -u "$user")"
          helper="/usr/local/libexec/opencode-cgroup-attach-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          helper_source="$(cd "$RUNNER_TEMP" && pwd -P)/opencode-cgroup-attach-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          npm run build:linux-cgroup-attach -- \
            --out "$helper_source" \
            --uid "$uid" \
            --control "$root/opencode-quality-workload/cgroup.procs"
          sudo install -d -o root -g root -m 0755 /usr/local/libexec
          sudo install -o root -g root -m 0555 "$helper_source" "$helper"
          rm -f "$helper_source"
          sudoers="/etc/sudoers.d/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          printf '%s ALL=(root) NOPASSWD: %s *\n' "$user" "$helper" | sudo tee "$sudoers" > /dev/null
          sudo chmod 0440 "$sudoers"
          sudo visudo -cf "$sudoers"
          if sudo -u "$user" sudo -n -- /usr/bin/tee "$(dirname "$root")/cgroup.procs" < /dev/null > /dev/null 2>&1; then
            echo "attach helper can write the guard cgroup" >&2
            exit 1
          fi
          echo "OPENCODE_QUALITY_RUN_USER=$user" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_RUN_HOME=$home" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ROOT=$root" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_MODE=sudo-helper-v2" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_HELPER=$helper" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_SUDOERS=$sudoers" >> "$GITHUB_ENV"

      - name: Reject stale Linux worker identity
        shell: bash
        run: |
          set -euo pipefail
          leaf="$OPENCODE_QUALITY_CGROUP_ROOT/opencode-quality-workload"
          pid_file="$RUNNER_TEMP/linux-helper-negative-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}.pid"
          probe_stdout="$RUNNER_TEMP/linux-helper-negative-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}.stdout"
          probe_stderr="$RUNNER_TEMP/linux-helper-negative-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}.stderr"
          worker_pid=""
          launcher_pid=""
          cleanup_probe() {
            if [[ -n "$worker_pid" ]]; then
              sudo kill -CONT "$worker_pid" 2> /dev/null || true
              sudo kill -KILL "$worker_pid" 2> /dev/null || true
            fi
            if [[ -n "$launcher_pid" ]]; then
              wait "$launcher_pid" 2> /dev/null || true
            fi
            if [[ -d "$leaf" ]]; then
              sudo -u "$OPENCODE_QUALITY_RUN_USER" rmdir "$leaf" 2> /dev/null || true
            fi
            rm -f "$pid_file" "$probe_stdout" "$probe_stderr"
          }
          trap cleanup_probe EXIT
          sudo -u "$OPENCODE_QUALITY_RUN_USER" mkdir "$leaf"
          sudo install -o "$OPENCODE_QUALITY_RUN_USER" -g "$OPENCODE_QUALITY_RUN_USER" -m 0600 /dev/null "$pid_file"
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /bin/sh -c \
            'printf "%s\n" "$$" > "$1"; exec /bin/sleep 60' sh "$pid_file" &
          launcher_pid=$!
          for _ in {1..100}; do
            [[ -s "$pid_file" ]] && break
            sleep 0.05
          done
          worker_pid="$(sudo -u "$OPENCODE_QUALITY_RUN_USER" cat "$pid_file")"
          [[ "$worker_pid" =~ ^[1-9][0-9]*$ ]]
          start_ticks="$(awk '{ print $22 }' "/proc/$worker_pid/stat")"
          [[ "$start_ticks" =~ ^[1-9][0-9]*$ ]]
          wrong_ticks="$((start_ticks + 1))"
          challenge="$(node -p 'require("node:crypto").randomBytes(32).toString("base64url")')"
          [[ "$challenge" =~ ^[A-Za-z0-9_-]{43}$ ]]
          set +e
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- sudo -n -- \
            "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" \
            "$worker_pid" "$wrong_ticks" "$challenge" > "$probe_stdout" 2> "$probe_stderr"
          helper_status=$?
          set -e
          worker_state="$(awk '{ print $3 }' "/proc/$worker_pid/stat")"
          attached=0
          grep -qx "$worker_pid" "$leaf/cgroup.procs" && attached=1
          alive=0
          sudo kill -0 "$worker_pid" 2> /dev/null && alive=1
          protocol_output=0
          [[ ! -s "$probe_stdout" && ! -s "$probe_stderr" ]] || protocol_output=1
          if [[ "$helper_status" -ne 77 || "$alive" -ne 1 || "$attached" -ne 0
            || "$protocol_output" -ne 0 || "$worker_state" == "T" || "$worker_state" == "t"
            || "$worker_state" == "Z" ]]; then
            echo "native Linux helper did not reject a stale worker identity without side effects" >&2
            exit 1
          fi
          trap - EXIT
          cleanup_probe
          [[ ! -d "$leaf" ]]

      - name: Run Linux operational verifier
        shell: bash
        run: |
          set -euo pipefail
          out="$GITHUB_WORKSPACE/.oc_harness/milestone-2/linux-runtime.json"
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /usr/bin/env \
            HOME="$OPENCODE_QUALITY_RUN_HOME" \
            PATH="$PATH" \
            CI=true \
            GITHUB_ACTIONS=true \
            GITHUB_SHA="$GITHUB_SHA" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            GITHUB_JOB="$GITHUB_JOB" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            OPENCODE_QUALITY_CGROUP_ROOT="$OPENCODE_QUALITY_CGROUP_ROOT" \
            OPENCODE_QUALITY_CGROUP_ATTACH_MODE="$OPENCODE_QUALITY_CGROUP_ATTACH_MODE" \
            OPENCODE_QUALITY_CGROUP_ATTACH_HELPER="$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" \
            npm run milestone:2:operational -- --dimension linux_runtime --out "$out"

      - name: Upload Linux operational receipt bundle
        if: always()
        shell: bash
        run: |
          if [[ -d "$GITHUB_WORKSPACE/.oc_harness" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/.oc_harness"
          fi

      - name: Publish Linux operational receipt bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-linux-runtime
          path: .oc_harness/milestone-2/linux-runtime.json
          if-no-files-found: error

      - name: Remove guarded cgroup-v2 delegation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
          cleanup_status=0
          if [[ -n "${OPENCODE_QUALITY_RUN_USER:-}" ]]; then
            workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
            while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
              sudo setfacl -x "u:$OPENCODE_QUALITY_RUN_USER" "$workspace_parent" || cleanup_status=$?
              workspace_parent="$(dirname "$workspace_parent")"
            done
          fi
          if [[ -n "${OPENCODE_QUALITY_CGROUP_ROOT:-}" && -d "$OPENCODE_QUALITY_CGROUP_ROOT" ]]; then
            sudo rmdir "$OPENCODE_QUALITY_CGROUP_ROOT" || cleanup_status=$?
          fi
          if [[ -n "${OPENCODE_QUALITY_SUDOERS:-}" && -f "$OPENCODE_QUALITY_SUDOERS" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_SUDOERS"
          fi
          if [[ -n "${OPENCODE_QUALITY_CGROUP_ATTACH_HELPER:-}" && -f "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER"
          fi
          exit "$cleanup_status"

  windows-containment:
    name: Windows Job Object operational evidence
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run Windows operational verifier
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE ".oc_harness\milestone-2\windows-runtime.json"
          npm run milestone:2:operational -- --dimension windows_runtime --out $out

      - name: Upload Windows operational receipt bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-windows-runtime
          path: .oc_harness/milestone-2/windows-runtime.json
          if-no-files-found: error

  macos-containment:
    name: macOS exclusive-UID operational evidence
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build and provision the macOS containment boundary
        shell: bash
        run: |
          set -euo pipefail
          node_executable="$(node -p 'process.execPath')"
          node_root="$(dirname "$(dirname "$node_executable")")"
          sudo find "$node_root" -xdev \( -type f -o -type d \) \( -perm -002 -o -perm -020 \) -exec chmod go-w {} +
          if sudo find "$node_root" -xdev \( -type f -o -type d \) \( -perm -002 -o -perm -020 \) -print -quit | grep -q .; then
            echo "trusted Node distribution remains group- or world-writable" >&2
            exit 1
          fi

          build_parent="$(cd "$RUNNER_TEMP" && pwd -P)"
          built_controller="$build_parent/opencode-quality-macos-controller-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          npm run build:macos-containment -- --out "$built_controller"
          controller="/usr/local/libexec/opencode-quality-macos-controller-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          sudo install -d -o root -g wheel -m 0755 /usr/local/libexec
          sudo chown root:wheel /usr/local /usr/local/libexec
          sudo chmod 0755 /usr/local /usr/local/libexec
          sudo install -o root -g wheel -m 0555 "$built_controller" "$controller"
          rm -f "$built_controller"
          echo "OPENCODE_QUALITY_MACOS_CONTROLLER=$controller" >> "$GITHUB_ENV"

          git_candidate="/opt/homebrew/bin/git"
          if [[ ! -x "$git_candidate" ]]; then
            git_candidate="/usr/bin/git"
          fi
          git_source="$(GIT_CANDIDATE="$git_candidate" node -e \
            'const fs = require("node:fs"); process.stdout.write(fs.realpathSync.native(process.env.GIT_CANDIDATE))')"
          case "$git_source" in
            /opt/homebrew/Cellar/git/*/bin/git|/usr/bin/git|/Library/Developer/CommandLineTools/usr/bin/git|/Applications/Xcode*.app/Contents/Developer/usr/bin/git) ;;
            *)
              echo "trusted macOS Git source resolved outside fixed installation roots: $git_source" >&2
              exit 1
              ;;
          esac
          fixed_git_root="/usr/local/libexec/opencode-quality-git"
          fixed_git="/usr/local/libexec/opencode-quality-git/bin/git"
          sudo install -d -o root -g wheel -m 0755 "$fixed_git_root" "$fixed_git_root/bin"
          sudo install -o root -g wheel -m 0555 "$git_source" "$fixed_git"
          echo "OPENCODE_QUALITY_MACOS_FIXED_GIT_ROOT=$fixed_git_root" >> "$GITHUB_ENV"

          shell_source="$(SHELL_CANDIDATE=/bin/sh node -e \
            'const fs = require("node:fs"); process.stdout.write(fs.realpathSync.native(process.env.SHELL_CANDIDATE))')"
          case "$shell_source" in
            /bin/sh|/bin/bash|/bin/zsh|/usr/bin/sh|/usr/bin/bash|/usr/bin/zsh) ;;
            *)
              echo "trusted macOS shell source resolved outside fixed system roots: $shell_source" >&2
              exit 1
              ;;
          esac
          fixed_shell_root="/usr/local/libexec/opencode-quality-shell"
          fixed_shell="/usr/local/libexec/opencode-quality-shell/bin/sh"
          sudo install -d -o root -g wheel -m 0755 "$fixed_shell_root" "$fixed_shell_root/bin"
          sudo install -o root -g wheel -m 0555 "$shell_source" "$fixed_shell"
          echo "OPENCODE_QUALITY_MACOS_FIXED_SHELL_ROOT=$fixed_shell_root" >> "$GITHUB_ENV"

          user="opencodequality"
          home="/Users/$user"
          if dscl . -read "/Users/$user" >/dev/null 2>&1; then
            echo "dedicated macOS workload account name already exists" >&2
            exit 1
          fi
          used_uids="$(dscl . -list /Users UniqueID | awk '{ print $2 }')"
          uid=550
          while grep -qx "$uid" <<< "$used_uids"; do
            uid=$((uid + 1))
            if [[ "$uid" -gt 599 ]]; then
              echo "no bounded dedicated macOS UID is available" >&2
              exit 1
            fi
          done
          echo "OPENCODE_QUALITY_RUN_USER=$user" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_RUN_UID=$uid" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_RUN_HOME=$home" >> "$GITHUB_ENV"
          sudo dscl . -create "/Users/$user"
          sudo dscl . -create "/Users/$user" UserShell /usr/bin/false
          sudo dscl . -create "/Users/$user" RealName "OpenCode Quality Workload"
          sudo dscl . -create "/Users/$user" UniqueID "$uid"
          sudo dscl . -create "/Users/$user" PrimaryGroupID 20
          sudo dscl . -create "/Users/$user" NFSHomeDirectory "$home"
          sudo dscl . -create "/Users/$user" IsHidden 1
          sudo install -d -o "$user" -g staff -m 0700 "$home"

          boundary_root="/private/var/db/opencode-quality"
          marker="$boundary_root/uid-$uid.marker"
          lease="$marker.lease"
          marker_source="$build_parent/opencode-quality-uid-$uid.marker"
          printf 'opencode-quality-exclusive-uid-v1:%s\n' "$uid" > "$marker_source"
          sudo install -d -o root -g wheel -m 0755 "$boundary_root"
          sudo install -o root -g wheel -m 0444 "$marker_source" "$marker"
          sudo install -o "$user" -g staff -m 0600 /dev/null "$lease"
          rm -f "$marker_source"
          echo "OPENCODE_QUALITY_MACOS_UID_MARKER=$marker" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_MACOS_UID_LEASE=$lease" >> "$GITHUB_ENV"

          if sudo dseditgroup -o checkmember -m "$user" admin | grep -q 'yes'; then
            echo "dedicated macOS workload account is unexpectedly an administrator" >&2
            exit 1
          fi
          if sudo -u "$user" sudo -n true >/dev/null 2>&1; then
            echo "dedicated macOS workload account has ambient sudo authorization" >&2
            exit 1
          fi
          sudo chown -R "$uid":staff "$GITHUB_WORKSPACE"
          sudo -u "$user" test -x "$(dirname "$GITHUB_WORKSPACE")"
          sudo -u "$user" test -r "$controller"
          if sudo -u "$user" test -w "$controller"; then
            echo "dedicated macOS workload account can modify the controller" >&2
            exit 1
          fi
          sudo -u "$user" /usr/bin/env PATH="$(dirname "$fixed_git")" git --version
          if sudo -u "$user" test -w "$fixed_git"; then
            echo "dedicated macOS workload account can modify fixed auxiliary Git" >&2
            exit 1
          fi
          sudo -u "$user" /usr/bin/env PATH="$(dirname "$fixed_shell")" sh -c 'exit 0'
          if sudo -u "$user" test -w "$fixed_shell"; then
            echo "dedicated macOS workload account can modify fixed npm script shell" >&2
            exit 1
          fi
          assert_protected_tool_path() {
            local tool="$1"
            local label="$2"
            local guard="$tool"
            local leaf=true
            while true; do
              if [[ -L "$guard" || "$(stat -f '%u' "$guard")" != "0" ]]; then
                echo "$label path is aliased or not root-owned: $guard" >&2
                exit 1
              fi
              local mode
              mode="$(stat -f '%Lp' "$guard")"
              if [[ "$leaf" = true ]]; then
                if [[ ! -f "$guard" || "$mode" != "555" || "$(stat -f '%l' "$guard")" != "1" ]]; then
                  echo "$label leaf is not a singly linked mode-0555 file" >&2
                  exit 1
                fi
                leaf=false
              elif [[ ! -d "$guard" ]] || (( (8#$mode & 8#22) != 0 )); then
                echo "$label ancestry is not a protected directory: $guard" >&2
                exit 1
              fi
              if sudo -u "$user" test -w "$guard"; then
                echo "$label path is writable by the workload account: $guard" >&2
                exit 1
              fi
              [[ "$guard" = "/" ]] && break
              guard="$(dirname "$guard")"
            done
          }
          assert_protected_tool_path "$fixed_git" "fixed auxiliary Git"
          assert_protected_tool_path "$fixed_shell" "fixed npm script shell"
          if sudo -u "$user" test -w "$marker"; then
            echo "dedicated macOS workload account can modify the UID marker" >&2
            exit 1
          fi
          sudo -u "$user" test -w "$lease"
          guard="$(dirname "$controller")"
          while true; do
            if sudo -u "$user" test -w "$guard"; then
              echo "dedicated macOS workload account can modify controller path ancestry: $guard" >&2
              exit 1
            fi
            [[ "$guard" = "/" ]] && break
            guard="$(dirname "$guard")"
          done
          sudo -u "$user" /usr/bin/env PATH="$PATH" node --version

      - name: Verify dedicated macOS workspace Git
        shell: bash
        run: |
          set -euo pipefail
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /usr/bin/env \
            HOME="$OPENCODE_QUALITY_RUN_HOME" \
            PATH="$PATH" \
            EXPECTED_WORKSPACE_GIT="$OPENCODE_QUALITY_MACOS_FIXED_GIT_ROOT/bin/git" \
            EXPECTED_HEAD="$GITHUB_SHA" \
            node --input-type=module -e '
              import {
                resolveTrustedGitExecutable,
                runSafeGitObservation,
              } from "./lib/quality/normal-session-workspace.mjs";
              const executable = resolveTrustedGitExecutable();
              if (executable !== process.env.EXPECTED_WORKSPACE_GIT) {
                throw new Error("macOS workspace observation selected an unexpected Git executable");
              }
              const head = runSafeGitObservation(process.cwd(), ["rev-parse", "HEAD"]).trim();
              if (head !== process.env.EXPECTED_HEAD) {
                throw new Error("macOS workspace Git did not observe the checked-out HEAD");
              }
            '

      - name: Run configured macOS full verifier
        shell: bash
        run: |
          set -euo pipefail
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /usr/bin/env \
            HOME="$OPENCODE_QUALITY_RUN_HOME" \
            PATH="$PATH" \
            CI=true \
            GITHUB_ACTIONS=true \
            GITHUB_SHA="$GITHUB_SHA" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            GITHUB_JOB="$GITHUB_JOB" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            OPENCODE_QUALITY_MACOS_CONTROLLER="$OPENCODE_QUALITY_MACOS_CONTROLLER" \
            OPENCODE_QUALITY_MACOS_WORKLOAD_UID="$OPENCODE_QUALITY_RUN_UID" \
            OPENCODE_QUALITY_MACOS_UID_MARKER="$OPENCODE_QUALITY_MACOS_UID_MARKER" \
            npm run verify

      - name: Run macOS operational verifier
        shell: bash
        run: |
          set -euo pipefail
          out="$GITHUB_WORKSPACE/.oc_harness/milestone-2/macos-runtime.json"
          set +e
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /usr/bin/env \
            HOME="$OPENCODE_QUALITY_RUN_HOME" \
            PATH="$PATH" \
            CI=true \
            GITHUB_ACTIONS=true \
            GITHUB_SHA="$GITHUB_SHA" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            GITHUB_JOB="$GITHUB_JOB" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            OPENCODE_QUALITY_MACOS_CONTROLLER="$OPENCODE_QUALITY_MACOS_CONTROLLER" \
            OPENCODE_QUALITY_MACOS_WORKLOAD_UID="$OPENCODE_QUALITY_RUN_UID" \
            OPENCODE_QUALITY_MACOS_UID_MARKER="$OPENCODE_QUALITY_MACOS_UID_MARKER" \
            npm run milestone:2:operational -- --dimension macos_runtime --out "$out"
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            echo "Bounded macOS workload-UID census after operational failure:" >&2
            /bin/ps -axo pid=,ppid=,ruid=,stat=,comm= \
              | /usr/bin/awk -v uid="$OPENCODE_QUALITY_RUN_UID" '$3 == uid { print }' >&2
          fi
          exit "$status"

      - name: Upload macOS operational receipt bundle
        if: always()
        shell: bash
        run: |
          if [[ -d "$GITHUB_WORKSPACE/.oc_harness" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/.oc_harness"
          fi

      - name: Publish macOS operational receipt bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-macos-runtime
          path: .oc_harness/milestone-2/macos-runtime.json
          if-no-files-found: error

      - name: Remove macOS containment boundary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
          if [[ -n "${OPENCODE_QUALITY_MACOS_CONTROLLER:-}" && -f "$OPENCODE_QUALITY_MACOS_CONTROLLER" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_MACOS_CONTROLLER"
          fi
          if [[ -n "${OPENCODE_QUALITY_MACOS_FIXED_GIT_ROOT:-}" && -d "$OPENCODE_QUALITY_MACOS_FIXED_GIT_ROOT" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_MACOS_FIXED_GIT_ROOT/bin/git"
            sudo rmdir "$OPENCODE_QUALITY_MACOS_FIXED_GIT_ROOT/bin"
            sudo rmdir "$OPENCODE_QUALITY_MACOS_FIXED_GIT_ROOT"
          fi
          if [[ -n "${OPENCODE_QUALITY_MACOS_FIXED_SHELL_ROOT:-}" && -d "$OPENCODE_QUALITY_MACOS_FIXED_SHELL_ROOT" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_MACOS_FIXED_SHELL_ROOT/bin/sh"
            sudo rmdir "$OPENCODE_QUALITY_MACOS_FIXED_SHELL_ROOT/bin"
            sudo rmdir "$OPENCODE_QUALITY_MACOS_FIXED_SHELL_ROOT"
          fi
          if [[ -n "${OPENCODE_QUALITY_MACOS_UID_LEASE:-}" && -f "$OPENCODE_QUALITY_MACOS_UID_LEASE" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_MACOS_UID_LEASE"
          fi
          if [[ -n "${OPENCODE_QUALITY_MACOS_UID_MARKER:-}" && -f "$OPENCODE_QUALITY_MACOS_UID_MARKER" ]]; then
            boundary_root="$(dirname "$OPENCODE_QUALITY_MACOS_UID_MARKER")"
            sudo rm -f "$OPENCODE_QUALITY_MACOS_UID_MARKER"
            sudo rmdir "$boundary_root" 2>/dev/null || true
          fi
          if [[ -n "${OPENCODE_QUALITY_RUN_USER:-}" ]] && dscl . -read "/Users/$OPENCODE_QUALITY_RUN_USER" >/dev/null 2>&1; then
            sudo dscl . -delete "/Users/$OPENCODE_QUALITY_RUN_USER"
          fi
          if [[ -n "${OPENCODE_QUALITY_RUN_HOME:-}" && -d "$OPENCODE_QUALITY_RUN_HOME" ]]; then
            sudo rm -rf "$OPENCODE_QUALITY_RUN_HOME"
          fi

  milestone-2-status:
    name: Milestone 2 receipt aggregation
    if: always()
    needs:
      - verify
      - linux-containment
      - windows-containment
      - macos-containment
    runs-on: ubuntu-latest
    steps:
      - name: Require successful receipt producers
        shell: bash
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
          LINUX_RESULT: ${{ needs.linux-containment.result }}
          WINDOWS_RESULT: ${{ needs.windows-containment.result }}
          MACOS_RESULT: ${{ needs.macos-containment.result }}
        run: |
          set -euo pipefail
          for result in "$VERIFY_RESULT" "$LINUX_RESULT" "$WINDOWS_RESULT" "$MACOS_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "A Milestone 2 receipt producer did not complete successfully." >&2
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download milestone receipt bundles
        uses: actions/download-artifact@v4
        with:
          pattern: milestone-2-*
          merge-multiple: true
          path: .oc_harness/milestone-2-ci

      - name: Aggregate real execution receipts
        shell: bash
        run: |
          set -euo pipefail
          npm run milestone:2:assess -- \
            --bundle-dir "$GITHUB_WORKSPACE/.oc_harness/milestone-2-ci" \
            --out "$GITHUB_WORKSPACE/.oc_harness/milestone-2-aggregate.json" \
            --host-unavailable

      - name: Upload milestone aggregate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-aggregate
          path: .oc_harness/milestone-2-aggregate.json
          if-no-files-found: error
