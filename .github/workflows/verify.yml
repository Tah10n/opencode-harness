            sudo rm -f "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER"
          fi
          exit "$cleanup_status"

  windows-containment:
    name: Windows Job Object operational evidence
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run Windows operational verifier
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE ".oc_harness\milestone-2\windows-runtime.json"
          npm run milestone:2:operational -- --dimension windows_runtime --out $out

      - name: Upload Windows operational receipt bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-windows-runtime
          path: .oc_harness/milestone-2/windows-runtime.json
          if-no-files-found: error

  milestone-2-status:
    name: Milestone 2 receipt aggregation
    if: always()
    needs:
      - verify
      - linux-containment
      - windows-containment
    runs-on: ubuntu-latest
    steps:
      - name: Require successful receipt producers
        shell: bash
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
          LINUX_RESULT: ${{ needs.linux-containment.result }}
          WINDOWS_RESULT: ${{ needs.windows-containment.result }}
        run: |
          set -euo pipefail
          for result in "$VERIFY_RESULT" "$LINUX_RESULT" "$WINDOWS_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "A Milestone 2 receipt producer did not complete successfully." >&2
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download milestone receipt bundles
        uses: actions/download-artifact@v4
        with:
          pattern: milestone-2-*
          merge-multiple: true
          path: .oc_harness/milestone-2-ci

      - name: Aggregate real execution receipts
        shell: bash
        run: |
          set -euo pipefail
          npm run milestone:2:assess -- \
            --bundle-dir "$GITHUB_WORKSPACE/.oc_harness/milestone-2-ci" \
            --out "$GITHUB_WORKSPACE/.oc_harness/milestone-2-aggregate.json" \
            --host-unavailable

      - name: Upload milestone aggregate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-aggregate
          path: .oc_harness/milestone-2-aggregate.json
          if-no-files-found: error
