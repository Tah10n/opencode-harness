name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Harness verification (deterministic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Harden trusted Node distribution permissions
        shell: bash
        run: |
          set -euo pipefail
          node_executable="$(node -p 'process.execPath')"
          node_root="$(dirname "$(dirname "$node_executable")")"
          sudo chmod -R go-w "$node_root"
          if sudo find "$node_root" -xdev -perm /022 -print -quit | grep -q .; then
            echo "trusted Node distribution remains group- or world-writable" >&2
            exit 1
          fi

      - name: Prepare guarded cgroup-v2 delegation
        shell: bash
        run: |
          set -euo pipefail
          user="opencode-quality"
          root="/sys/fs/cgroup/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          home="/home/$user"
          sudo useradd --create-home --home-dir "$home" --shell /usr/sbin/nologin "$user"
          workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
          while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
            sudo setfacl -m "u:$user:--x" "$workspace_parent"
            workspace_parent="$(dirname "$workspace_parent")"
          done
          sudo chown -R "$user:$user" "$GITHUB_WORKSPACE"
          sudo mkdir "$root"
          sudo chown -R "$user:$user" "$root"
          sudo -u "$user" test -w "$root/cgroup.procs"
          sudo -u "$user" test -w "$root/cgroup.threads"
          sudo -u "$user" test -w "$root/cgroup.subtree_control"
          if sudo -u "$user" test -w "$(dirname "$root")/cgroup.procs"; then
            echo "guard cgroup is writable by the workload principal" >&2
            exit 1
          fi
          uid="$(id -u "$user")"
          helper="/usr/local/libexec/opencode-cgroup-attach-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          helper_source="$(mktemp)"
          cat > "$helper_source" <<EOF
          #!/bin/sh
          set -eu
          expected_uid="$uid"
          control="$root/opencode-quality-workload/cgroup.procs"
          [ "\${SUDO_UID:-}" = "\$expected_uid" ] || exit 77
          [ "\$#" -eq 1 ] || exit 64
          pid="\$1"
          case "\$pid" in *[!0-9]*|'') exit 64 ;; esac
          [ "\$pid" -gt 0 ] || exit 64
          target_uid="\$(/usr/bin/awk '\$1 == "Uid:" { print \$2; exit }' "/proc/\$pid/status")"
          [ "\$target_uid" = "\$expected_uid" ] || exit 77
          printf '%s\n' "\$pid" > "\$control"
          /usr/bin/grep -qx "\$pid" "\$control"
          printf 'ATTACHED:%s\n' "\$pid"
          EOF
          sudo install -d -o root -g root -m 0755 /usr/local/libexec
          sudo install -o root -g root -m 0555 "$helper_source" "$helper"
          rm -f "$helper_source"
          sudoers="/etc/sudoers.d/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          printf '%s ALL=(root) NOPASSWD: %s *\n' "$user" "$helper" | sudo tee "$sudoers" > /dev/null
          sudo chmod 0440 "$sudoers"
          sudo visudo -cf "$sudoers"
          if sudo -u "$user" sudo -n -- /usr/bin/tee "$(dirname "$root")/cgroup.procs" < /dev/null > /dev/null 2>&1; then
            echo "attach helper can write the guard cgroup" >&2
            exit 1
          fi
          echo "OPENCODE_QUALITY_RUN_USER=$user" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_RUN_HOME=$home" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ROOT=$root" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_MODE=sudo-helper-v1" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_HELPER=$helper" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_SUDOERS=$sudoers" >> "$GITHUB_ENV"

      - name: Run deterministic verifier
        shell: bash
        run: |
          set -euo pipefail
          out="$GITHUB_WORKSPACE/.oc_harness/milestone-2/deterministic.json"
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /usr/bin/env \
            HOME="$OPENCODE_QUALITY_RUN_HOME" \
            PATH="$PATH" \
            CI=true \
            GITHUB_ACTIONS=true \
            GITHUB_SHA="$GITHUB_SHA" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            GITHUB_JOB="$GITHUB_JOB" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_BASE_SHA="${GITHUB_BASE_SHA:-}" \
            GITHUB_EVENT_BEFORE="${GITHUB_EVENT_BEFORE:-}" \
            OPENCODE_QUALITY_CGROUP_ROOT="$OPENCODE_QUALITY_CGROUP_ROOT" \
            OPENCODE_QUALITY_CGROUP_ATTACH_MODE="$OPENCODE_QUALITY_CGROUP_ATTACH_MODE" \
            OPENCODE_QUALITY_CGROUP_ATTACH_HELPER="$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" \
            OPENCODE_MILESTONE_RECEIPTS_OUT="$out" \
            npm run verify
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

      - name: Upload deterministic receipt bundle
        if: always()
        shell: bash
        run: |
          if [[ -d "$GITHUB_WORKSPACE/.oc_harness" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/.oc_harness"
          fi

      - name: Publish deterministic receipt bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-deterministic
          path: .oc_harness/milestone-2/deterministic.json
          if-no-files-found: error

      - name: Remove guarded cgroup-v2 delegation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
          cleanup_status=0
          workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
          while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
            sudo setfacl -x "u:$OPENCODE_QUALITY_RUN_USER" "$workspace_parent" || cleanup_status=$?
            workspace_parent="$(dirname "$workspace_parent")"
          done
          if [[ -n "${OPENCODE_QUALITY_CGROUP_ROOT:-}" && -d "$OPENCODE_QUALITY_CGROUP_ROOT" ]]; then
            sudo rmdir "$OPENCODE_QUALITY_CGROUP_ROOT" || cleanup_status=$?
          fi
          if [[ -n "${OPENCODE_QUALITY_SUDOERS:-}" && -f "$OPENCODE_QUALITY_SUDOERS" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_SUDOERS"
          fi
          if [[ -n "${OPENCODE_QUALITY_CGROUP_ATTACH_HELPER:-}" && -f "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" ]]; then
            sudo rm -f "$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER"
          fi
          exit "$cleanup_status"

  linux-containment:
    name: Linux cgroup-v2 operational evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Harden trusted Node distribution permissions
        shell: bash
        run: |
          set -euo pipefail
          node_executable="$(node -p 'process.execPath')"
          node_root="$(dirname "$(dirname "$node_executable")")"
          sudo chmod -R go-w "$node_root"
          if sudo find "$node_root" -xdev -perm /022 -print -quit | grep -q .; then
            echo "trusted Node distribution remains group- or world-writable" >&2
            exit 1
          fi

      - name: Prepare guarded cgroup-v2 delegation
        shell: bash
        run: |
          set -euo pipefail
          user="opencode-quality"
          root="/sys/fs/cgroup/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          home="/home/$user"
          sudo useradd --create-home --home-dir "$home" --shell /usr/sbin/nologin "$user"
          workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
          while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
            sudo setfacl -m "u:$user:--x" "$workspace_parent"
            workspace_parent="$(dirname "$workspace_parent")"
          done
          sudo chown -R "$user:$user" "$GITHUB_WORKSPACE"
          sudo mkdir "$root"
          sudo chown -R "$user:$user" "$root"
          sudo -u "$user" test -w "$root/cgroup.procs"
          sudo -u "$user" test -w "$root/cgroup.threads"
          sudo -u "$user" test -w "$root/cgroup.subtree_control"
          if sudo -u "$user" test -w "$(dirname "$root")/cgroup.procs"; then
            echo "guard cgroup is writable by the workload principal" >&2
            exit 1
          fi
          uid="$(id -u "$user")"
          helper="/usr/local/libexec/opencode-cgroup-attach-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          helper_source="$(mktemp)"
          cat > "$helper_source" <<EOF
          #!/bin/sh
          set -eu
          expected_uid="$uid"
          control="$root/opencode-quality-workload/cgroup.procs"
          [ "\${SUDO_UID:-}" = "\$expected_uid" ] || exit 77
          [ "\$#" -eq 1 ] || exit 64
          pid="\$1"
          case "\$pid" in *[!0-9]*|'') exit 64 ;; esac
          [ "\$pid" -gt 0 ] || exit 64
          target_uid="\$(/usr/bin/awk '\$1 == "Uid:" { print \$2; exit }' "/proc/\$pid/status")"
          [ "\$target_uid" = "\$expected_uid" ] || exit 77
          printf '%s\n' "\$pid" > "\$control"
          /usr/bin/grep -qx "\$pid" "\$control"
          printf 'ATTACHED:%s\n' "\$pid"
          EOF
          sudo install -d -o root -g root -m 0755 /usr/local/libexec
          sudo install -o root -g root -m 0555 "$helper_source" "$helper"
          rm -f "$helper_source"
          sudoers="/etc/sudoers.d/opencode-harness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          printf '%s ALL=(root) NOPASSWD: %s *\n' "$user" "$helper" | sudo tee "$sudoers" > /dev/null
          sudo chmod 0440 "$sudoers"
          sudo visudo -cf "$sudoers"
          if sudo -u "$user" sudo -n -- /usr/bin/tee "$(dirname "$root")/cgroup.procs" < /dev/null > /dev/null 2>&1; then
            echo "attach helper can write the guard cgroup" >&2
            exit 1
          fi
          echo "OPENCODE_QUALITY_RUN_USER=$user" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_RUN_HOME=$home" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ROOT=$root" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_MODE=sudo-helper-v1" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_CGROUP_ATTACH_HELPER=$helper" >> "$GITHUB_ENV"
          echo "OPENCODE_QUALITY_SUDOERS=$sudoers" >> "$GITHUB_ENV"

      - name: Run Linux operational verifier
        shell: bash
        run: |
          set -euo pipefail
          out="$GITHUB_WORKSPACE/.oc_harness/milestone-2/linux-runtime.json"
          sudo -u "$OPENCODE_QUALITY_RUN_USER" -- /usr/bin/env \
            HOME="$OPENCODE_QUALITY_RUN_HOME" \
            PATH="$PATH" \
            CI=true \
            GITHUB_ACTIONS=true \
            GITHUB_SHA="$GITHUB_SHA" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            GITHUB_JOB="$GITHUB_JOB" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            OPENCODE_QUALITY_CGROUP_ROOT="$OPENCODE_QUALITY_CGROUP_ROOT" \
            OPENCODE_QUALITY_CGROUP_ATTACH_MODE="$OPENCODE_QUALITY_CGROUP_ATTACH_MODE" \
            OPENCODE_QUALITY_CGROUP_ATTACH_HELPER="$OPENCODE_QUALITY_CGROUP_ATTACH_HELPER" \
            npm run milestone:2:operational -- --dimension linux_runtime --out "$out"

      - name: Upload Linux operational receipt bundle
        if: always()
        shell: bash
        run: |
          if [[ -d "$GITHUB_WORKSPACE/.oc_harness" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/.oc_harness"
          fi

      - name: Publish Linux operational receipt bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-2-linux-runtime
          path: .oc_harness/milestone-2/linux-runtime.json
          if-no-files-found: error

      - name: Remove guarded cgroup-v2 delegation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
          cleanup_status=0
          workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
          while [[ "$workspace_parent" != "/home" && "$workspace_parent" != "/" ]]; do
            sudo setfacl -x "u:$OPENCODE_QUALITY_RUN_USER" "$workspace_parent" || cleanup_status=$?
            workspace_parent="$(dirname "$workspace_parent")"
          done
          if [[ -n "${OPENCODE_QUALITY_CGROUP_ROOT:-}" && -d "$OPENCODE_QUALITY_CGROUP_ROOT" ]]; then
            sudo rmdir "$OPENCODE_QUALITY_CGROUP_ROOT" || cleanup_status=$?
          fi
          if [[ -n "${OPENCODE_QUALITY_SUDOERS:-}" && -f "$OPENCODE_QUALITY_SUDOERS" ]]; then
